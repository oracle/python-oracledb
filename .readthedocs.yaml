# required
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.9"

# ensure that the submodules are included
submodules:
  include: all
  recursive: true

# Build documentation in the doc/src directory with Sphinx
sphinx:
   configuration: doc/src/conf.py

# Build optional documentation formats
formats:
  - pdf
  - epub
  - htmlzip

# declare Python requirements required to build docs
python:
   install:
   - requirements: doc/requirements.txt
   - method: pip
     path: .
